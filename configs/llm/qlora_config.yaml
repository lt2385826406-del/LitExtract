# QLoRA Fine-tuning Configuration
# For Qwen2.5-7B-Instruct (r=16, alpha=32).
# Mistral-7B-Instruct-v0.2 variant uses r=64, alpha=128 (see paper).

model:
  base_model: Qwen/Qwen2.5-7B-Instruct
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj

quantization:
  use_4bit: true
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_quant_type: nf4
  bnb_4bit_use_double_quant: true

training:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  num_train_epochs: 3
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.001
  max_seq_length: 8192
  packing: false
  optim: paged_adamw_8bit
  bf16: true
  gradient_checkpointing: true
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3
