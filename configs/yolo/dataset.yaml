# YOLOv11 Dataset Configuration — PDF Graphic Element Detection
# LitExtract
#
# Class definitions (4 structural classes detected by YOLOv11):
#   0: caption        — figure caption / label text (e.g., "Fig. 1")
#   1: image          — entire figure image region
#   2: subgraph       — sub-figure region within a composite figure
#   3: subgraph_label — sub-figure label (e.g., "a", "b", "c")
#
# These are the actual classes used in training (see training_process_paper.md
# in the training folder D:\python\20251031_yolov11).

# Dataset paths
train: data/annotations/yolo_labels/train/images
val:   data/annotations/yolo_labels/val/images
test:  data/annotations/yolo_labels/test/images

nc: 4  # number of classes

names:
  0: caption
  1: image
  2: subgraph
  3: subgraph label
