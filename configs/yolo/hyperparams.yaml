# YOLOv11 Training Hyperparameters

model:
  name: yolov11n  # n/s/m/l/x
  pretrained: true
  weights: null

training:
  epochs: 300
  batch_size: 16
  imgsz: 640
  optimizer: AdamW
  lr0: 0.001
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3
  box: 7.5
  cls: 0.5
  dfl: 1.5
  label_smoothing: 0.1
