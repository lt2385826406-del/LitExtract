name: litextract
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - numpy=1.26.4
  - pandas=2.1.4
  - pillow=10.2.0
  - pip
  - pip:
    # Core
    - gradio==3.50.2
    - pyyaml>=5.3.1
    - requests>=2.23.0
    - pymupdf>=1.26.0
    - pdf2image>=1.16.0
    - networkx>=3.0
    - pyvis>=0.3.0
    # Vision (YOLO, ResNet)
    - ultralytics>=8.0.0
    - torch>=2.0.0
    - torchvision>=0.15.0
    - opencv-python>=4.6.0
    - matplotlib>=3.7.0
    - seaborn>=0.12.0
    # OCR
    - pytesseract>=0.3.10
    # LLM (optional, requires GPU)
    # - transformers>=4.40.0
    # - peft>=0.10.0
    # - bitsandbytes>=0.43.0
    # - accelerate>=0.30.0
    # - datasets>=2.18.0
    # - trl>=0.8.0
    # Dev
    - pytest>=7.0
    - ruff>=0.4.0
